<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保護犬譲渡サイト：こうめ</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family:sans-serif;
    background:#5b0b12;
    color:#fff8f8;
}
</style>

</head>

<body class="min-h-screen py-8 px-4 md:px-8 flex justify-center">

<div class="max-w-5xl w-full space-y-4">

    <!-- 名前：上・大 -->
    <header class="text-center">
        <h1 class="text-[110px] md:text-[170px] font-bold tracking-wider text-red-200 leading-none">
            こうめ
        </h1>
    </header>
<div class="border border-red-800 bg-red-950/60 p-5 rounded-2xl text-center">

  <p class="text-red-300 text-xs">
    プロフィール
  </p>

  <div class="text-2xl font-bold tracking-widest text-white">
    性別：男の子
    年齢:3歳
  </div>

</div>

    <!-- 写真：大・全身・家背景 -->
    <div class="w-full flex justify-center">
        <div class="w-[900px] bg-red-950/50 p-3 rounded-2xl border-2 border-red-800/80 shadow-xl">

            <div class="rounded-xl overflow-hidden">

                <img
                    src="dog_10.jpg"
                    alt="こうめ"
                    class="w-full h-auto object-cover">

            </div>

            <p class="text-center text-sm text-red-300 mt-2">
                こうめくんの日常写真（dog_10.jpg）
            </p>

        </div>
    </div>

    <!-- 紹介文：下・詳しい -->
    <div class="bg-red-950/40 p-4 md:p-5 rounded-xl border border-red-800/80">

        <h2 class="text-lg font-bold text-red-200 border-b border-red-800 pb-2">
            紹介文
        </h2>

        <p class="leading-loose text-base md:text-lg whitespace-pre-line text-red-50 mt-3">
ボール遊びとヨーグルトが大好きです。
初めて会う人には少し緊張しますが、慣れるとしっぽを振って近寄ってきます。
散歩が大好きで、公園では元気いっぱい走ります。
優しく接してくださる家族との出会いを待っています。
        </p>

    </div>

    <!-- 保護理由：あり -->
    <div class="bg-red-950/40 p-4 md:p-5 rounded-xl border border-red-800/80">

        <h2 class="text-lg font-bold text-red-200 border-b border-red-800 pb-2">
            保護された理由
        </h2>

        <p class="leading-relaxed text-base md:text-lg text-red-50 mt-3">
            飼い主の病気により飼育が継続できなくなり保護されました。
        </p>

    </div>
    

    <!-- 6. 譲渡費用 -->
<div class="bg-red-950/40 p-6 md:p-8 rounded-2xl border border-red-800/80 space-y-3">
  <h2 class="text-xl font-bold text-red-200 border-b border-red-800 pb-2">
    譲渡費用
  </h2>
  <p class="leading-relaxed text-base md:text-lg text-red-100">
    36000円
  </p>
</div>

    <!-- ボタン -->
    <div class="text-center pt-2">

        <button
        onclick="alert('お気軽にお問い合わせください。スタッフがご案内いたします。🐾')"
        class="inline-flex items-center justify-center bg-red-600 hover:bg-red-500 active:bg-red-700 text-white font-bold px-10 py-3 rounded-full shadow-lg border border-red-400 w-full md:w-auto">

            この子に会ってみる

        </button>

    </div>

</div>

</body>
</html>
